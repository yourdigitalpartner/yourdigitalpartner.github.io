name: Apply site fixes

on:
  push:
    branches:
      - site-wide-mobile-seo-fixes

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply shared updates
        run: python scripts/apply_shared_fixes.py
      - name: Apply page-specific updates
        run: python scripts/apply_page_fixes.py
      - name: Apply final HTML tidy
        run: python scripts/final_tidy.py
      - name: Update privacy notice
        run: python scripts/fix_privacy.py
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html success-stories/index.html privacy/index.html solutions/seo-aeo-visibility/index.html solutions/website-optimisation-cro/index.html solutions/paid-campaigns/index.html solutions/ai-marketing/index.html
          git diff --cached --quiet || git commit -m "Apply mobile, accessibility and SEO fixes"
          git push
