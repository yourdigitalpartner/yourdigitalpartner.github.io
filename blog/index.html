<!doctype html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="https://your-digital-partner.co.uk/blog/">
<title>Free Guides &amp; Insights | Your Digital Partner</title>
<meta name="description" content="Practical SEO, AEO, CRO and AI marketing guides and insights from Your Digital Partner.">
<link rel="icon" type="image/svg+xml" href="/assets/logo-icon.svg">
<style>
*{margin:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
:root{--bg:#f1f4fa;--ink:#0a1733;--mut:#5b6b80;--lime:#35e0c8;--card:#fff;--line:#d8e0ec;--soft:#e0eef6;--green:#0d9488;--greenSoft:#dcf3ef}
body{background:var(--bg);color:var(--ink);padding-top:110px;padding-bottom:80px}

nav{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:8px;align-items:center;background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:99px;padding:8px 10px 8px 22px;box-shadow:0 10px 30px rgba(8,20,48,.08);width:min(920px,94vw);justify-content:space-between}
.navr{display:flex;align-items:center;gap:10px}
.logo{font-weight:800;font-size:15.5px;display:flex;align-items:center;gap:9px;color:var(--ink);text-decoration:none}
.logo b{color:#0d9488}
nav ul{display:flex;gap:20px;list-style:none;font-size:13px;color:#4d5b6e}
nav ul li a{color:inherit;text-decoration:none}
.cta{background:var(--ink);color:var(--lime);border:none;padding:10px 20px;border-radius:99px;font-size:13px;font-weight:700;text-decoration:none;display:inline-block}
.nav-book{background:#fff;color:var(--ink);border:2px solid var(--ink);border-radius:99px;padding:7px 14px;font-size:12px;font-weight:700;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
@media(max-width:900px){nav ul{display:none}.navr>.cta{display:none}.navr>.nav-book{display:none}}

.wrap{max-width:1100px;margin:0 auto;padding:0 24px}

.page-head{text-align:center;margin-bottom:44px}
.page-head h1{font-size:clamp(30px,4vw,44px);font-weight:800;letter-spacing:-.02em;margin-bottom:10px}
.page-head p{color:var(--mut);font-size:15px}

.filters{display:flex;flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:36px;padding:16px;background:var(--card);border:1px solid var(--line);border-radius:18px}
.filters-label{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);margin-right:4px}
.pill{border:1.5px solid var(--line);background:#fff;color:var(--mut);font-size:13px;font-weight:700;padding:7px 14px;border-radius:99px;cursor:pointer;transition:all .15s}
.pill:hover{border-color:var(--ink);color:var(--ink)}
.pill.active{background:var(--ink);border-color:var(--ink);color:var(--lime)}
.type-select{margin-left:auto;border:1.5px solid var(--line);border-radius:99px;padding:7px 16px;font-size:13px;font-weight:700;color:var(--ink);background:#fff;cursor:pointer}

.featured{display:grid;grid-template-columns:1.4fr 1fr;gap:24px;margin-bottom:52px}
.featured-main{position:relative;border-radius:24px;overflow:hidden;min-height:420px;display:flex;align-items:flex-end;color:#fff;background:#0a1733;text-decoration:none}
.featured-main img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.featured-main .content{position:relative;padding:32px;z-index:1}
.featured-side{display:flex;flex-direction:column;gap:24px}
.featured-card{position:relative;border-radius:24px;overflow:hidden;flex:1;min-height:190px;display:flex;align-items:flex-end;color:#fff;background:#0a1733;text-decoration:none}
.featured-card img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.featured-card .content{position:relative;padding:24px;z-index:1}

.tag-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.tag-badge{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;background:rgba(255,255,255,.18);backdrop-filter:blur(6px);padding:5px 10px;border-radius:99px;color:#fff}
.type-badge{font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;background:var(--lime);color:var(--ink);padding:5px 10px;border-radius:99px}
.featured-main h2{font-size:26px;font-weight:800;line-height:1.2;margin-bottom:8px;color:#fff}
.featured-card h3{font-size:17px;font-weight:800;line-height:1.25;margin-bottom:6px;color:#fff}
.featured-main p,.featured-card p{font-size:13.5px;color:#cdd6e6;max-width:520px}

.grid-head{font-size:20px;font-weight:800;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;overflow:hidden;transition:all .2s;text-decoration:none;color:var(--ink);display:flex;flex-direction:column}
.card:hover{border-color:var(--ink);box-shadow:0 14px 34px rgba(8,20,48,.1);transform:translateY(-2px)}
.card img{width:100%;height:160px;object-fit:cover}
.card-body{padding:18px 20px 22px}
.card .tag-row{margin-bottom:10px}
.card .tag-badge{background:var(--greenSoft);color:var(--green)}
.card .type-badge{background:var(--soft);color:var(--ink)}
.card h3{font-size:16px;font-weight:800;margin-bottom:8px;line-height:1.3}
.card p{font-size:13.5px;color:var(--mut);line-height:1.6}
.card-meta{font-size:12px;color:var(--mut);margin-top:12px}

.empty{display:none;text-align:center;padding:60px 0;color:var(--mut)}

@media(max-width:900px){.featured{grid-template-columns:1fr}.grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid{grid-template-columns:1fr}.type-select{margin-left:0;width:100%}}
</style>
</head>
<body>

<nav>
  <a class="logo" href="/"><span>your<b>digital</b>partner</span></a>
  <ul>
    <li><a href="/solutions/seo-aeo-visibility/">Solutions</a></li>
    <li><a href="/success-stories/">Success Stories</a></li>
    <li><a href="/blog/" style="color:#3a4d70;font-weight:800">Free Guides</a></li>
    <li><a href="/#approach">About</a></li>
  </ul>
  <div class="navr">
    <a class="cta" href="/#scorecard">Free AEO audit</a>
    <a class="nav-book" href="https://meetings-eu1.hubspot.com/cchapman" target="_blank" rel="noopener">Call</a>
  </div>
</nav>

<div class="wrap">
  <div class="page-head">
    <h1>Free guides &amp; insights</h1>
    <p>Practical SEO, AEO, CRO and AI marketing advice - no fluff.</p>
  </div>

  <div class="filters" id="filters"></div>
  <div class="featured" id="featured"></div>

  <div class="grid" id="grid"></div>
  <div class="empty" id="empty">No articles match these filters yet.</div>
</div>

<script>
let posts = [];
let activeTags = new Set();
let activeType = "all";

function allTags(){ return [...new Set(posts.flatMap(p=>p.tags))]; }
function allTypes(){ return [...new Set(posts.map(p=>p.type))]; }

function renderFilters(){
  const el = document.getElementById('filters');
  const tagPills = allTags().map(t=>`<button class="pill${activeTags.has(t)?' active':''}" data-tag="${t}">${t}</button>`).join('');
  el.innerHTML = `<span class="filters-label">Filter by tag</span>${tagPills}
    <select class="type-select" id="typeSelect">
      <option value="all">All types</option>
      ${allTypes().map(t=>`<option value="${t}"${activeType===t?' selected':''}>${t.charAt(0).toUpperCase()+t.slice(1)}</option>`).join('')}
    </select>`;
  el.querySelectorAll('.pill').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const tag = btn.dataset.tag;
      activeTags.has(tag) ? activeTags.delete(tag) : activeTags.add(tag);
      render();
    });
  });
  document.getElementById('typeSelect').addEventListener('change', e=>{
    activeType = e.target.value;
    render();
  });
}

function matches(p){
  const tagMatch = activeTags.size===0 || p.tags.some(t=>activeTags.has(t));
  const typeMatch = activeType==="all" || p.type===activeType;
  return tagMatch && typeMatch;
}

function badgeRow(p){
  return `<div class="tag-row">${p.tags.map(t=>`<span class="tag-badge">${t}</span>`).join('')}<span class="type-badge">${p.type}</span></div>`;
}

function render(){
  renderFilters();
  const filtered = posts.filter(matches);
  const featured = filtered.filter(p=>p.featured);
  const rest = filtered.filter(p=>!p.featured);

  const fEl = document.getElementById('featured');
  if(featured.length){
    fEl.style.display = 'grid';
    fEl.innerHTML = `
      <a class="featured-main" href="${featured[0].url}">
        <img src="${featured[0].image}">
        <div class="content">${badgeRow(featured[0])}<h2>${featured[0].title}</h2><p>${featured[0].excerpt}</p></div>
      </a>
      <div class="featured-side">
        ${featured.slice(1,3).map(p=>`
          <a class="featured-card" href="${p.url}">
            <img src="${p.image}">
            <div class="content">${badgeRow(p)}<h3>${p.title}</h3><p>${p.excerpt}</p></div>
          </a>`).join('')}
      </div>`;
  } else {
    fEl.style.display = 'none';
  }

  const gEl = document.getElementById('grid');
  const emptyEl = document.getElementById('empty');
  if(rest.length===0 && featured.length===0){
    gEl.innerHTML = ''; emptyEl.style.display='block';
  } else {
    emptyEl.style.display='none';
    gEl.innerHTML = rest.map(p=>`
      <a class="card" href="${p.url}">
        <img src="${p.image}">
        <div class="card-body">
          ${badgeRow(p)}
          <h3>${p.title}</h3>
          <p>${p.excerpt}</p>
          <div class="card-meta">${p.date}</div>
        </div>
      </a>`).join('');
  }
}

fetch('/blog/posts.json')
  .then(r => r.json())
  .then(data => { posts = data; render(); })
  .catch(() => {
    document.getElementById('empty').style.display = 'block';
    document.getElementById('empty').textContent = 'Could not load articles right now.';
  });
</script>

</body>
</html>
