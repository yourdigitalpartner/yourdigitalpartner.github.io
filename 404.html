<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,follow">
<link rel="icon" type="image/svg+xml" href="/assets/logo-icon.svg">
<title>Page Not Found | Your Digital Partner</title>
<style>
:root{--bg:#f1f4fa;--ink:#0a1733;--mut:#5b6b80;--lime:#35e0c8;--line:#d8e0ec}
*{box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(650px at 20% 15%,rgba(47,95,208,.14),transparent 70%),radial-gradient(650px at 85% 80%,rgba(53,224,200,.18),transparent 70%),var(--bg);color:var(--ink);padding:24px;text-align:center}
.card{width:min(620px,100%);background:#fff;border:1px solid var(--line);border-radius:28px;padding:56px 34px;box-shadow:0 24px 60px rgba(8,20,48,.12)}
.code{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:#0d9488;font-weight:800}h1{font-size:clamp(34px,6vw,58px);line-height:1.05;margin:14px 0}.hl{background:var(--lime);border-radius:12px;padding:0 10px}p{color:var(--mut);line-height:1.7;max-width:460px;margin:0 auto 26px}.actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}.btn{display:inline-block;background:var(--ink);color:var(--lime);font-weight:800;padding:14px 24px;border-radius:99px;text-decoration:none}.btn.alt{background:var(--bg);color:var(--ink);border:1px solid var(--line)}
</style>
</head>
<body>
<main class="card">
<div class="code">Error 404</div>
<h1>This page has <span class="hl">moved on.</span></h1>
<p>The address may be incorrect, or the page may have been removed. Head back to the homepage or browse the latest results.</p>
<div class="actions"><a class="btn" href="/">Go to homepage</a><a class="btn alt" href="/success-stories">See success stories</a></div>
</main>
</body>
</html>
